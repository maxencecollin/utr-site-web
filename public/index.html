<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Redirection de la racine vers la langue par defaut (export statique :
         le proxy/middleware ne tourne pas, on redirige cote client + meta-refresh).
         Sur serveur plus tard, c'est le middleware next-intl qui gerera la racine. -->
    <meta http-equiv="refresh" content="0; url=/fr/" />
    <link rel="canonical" href="/fr/" />
    <script>
      window.location.replace("/fr/");
    </script>
    <title>Ultra Tour de la Ria d'Étel</title>
  </head>
  <body>
    <p>Redirection vers <a href="/fr/">/fr/</a>…</p>
  </body>
</html>
